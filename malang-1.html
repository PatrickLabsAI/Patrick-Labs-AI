<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>이든이가족쉼터</title>
<link href="https://fonts.googleapis.com/css2?family=Gowun+Batang:wght@400;700&family=Noto+Sans+KR:wght@300;400&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:100%;height:100%;background:#0e0c0a;color:#e8ddd3;font-family:'Noto Sans KR',sans-serif;overflow:hidden;}
  input[type=number]::-webkit-inner-spin-button,
  input[type=number]::-webkit-outer-spin-button{-webkit-appearance:none;margin:0;}

  .blob-bg{position:fixed;border-radius:50%;pointer-events:none;}
  .blob-a{width:500px;height:500px;background:rgba(180,120,70,0.055);filter:blur(90px);top:-120px;left:-120px;}
  .blob-b{width:400px;height:400px;background:rgba(140,90,50,0.04);filter:blur(80px);bottom:-80px;right:-80px;}

  /* 앱 레이아웃 */
  #app{width:100vw;height:100vh;display:flex;flex-direction:column;position:relative;z-index:1;}

  /* 헤더 */
  .header{display:flex;align-items:center;gap:14px;padding:20px 24px 16px;flex-shrink:0;border-bottom:1px solid #1a1410;}
  .logo-img{width:36px;height:36px;border-radius:50%;overflow:hidden;border:1.5px solid rgba(200,149,106,0.28);box-shadow:0 0 12px rgba(200,149,106,0.12);flex-shrink:0;}
  .logo-img img{width:100%;height:100%;object-fit:cover;object-position:center 20%;}
  .logo-text{font-family:'Gowun Batang',serif;font-size:0.9rem;color:#c8956a;opacity:0.7;letter-spacing:0.1em;}

  /* 컨텐츠 */
  .content{flex:1;display:flex;overflow-y:auto;}
  .breath-page{display:flex;flex-direction:column;align-items:center;justify-content:center;flex:1;padding:32px 24px 48px;min-height:100%;}

  /* 공통 버튼 */
  .btn-main{background:transparent;border:1px solid #c8956a;color:#c8956a;padding:13px 46px;border-radius:50px;font-size:0.88rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;letter-spacing:0.08em;transition:all 0.25s;}
  .btn-main:hover{background:rgba(200,149,106,0.12);}

  /* 드롭다운 */
  .dropdown-wrap{position:relative;}
  .dropdown-trigger{background:transparent;border:1px solid #2e261e;color:#c8956a;padding:9px 22px 9px 18px;border-radius:50px;font-size:0.82rem;cursor:pointer;font-family:'Noto Sans KR',sans-serif;display:flex;align-items:center;gap:10;transition:all 0.2s;}
  .dropdown-trigger.open{background:rgba(200,149,106,0.14);border-color:#c8956a;}
  .dropdown-trigger .desc{color:#5a4a3c;font-size:0.73rem;}
  .dropdown-trigger .arr{font-size:0.55rem;color:#4a3e34;}
  .dropdown-menu{position:absolute;top:calc(100% + 10px);left:50%;transform:translateX(-50%);background:#16120e;border:1px solid #2e261e;border-radius:16px;padding:8px;z-index:99;min-width:220px;box-shadow:0 8px 40px rgba(0,0,0,0.7);display:none;}
  .dropdown-menu.open{display:block;}
  .dropdown-item{display:flex;justify-content:space-between;align-items:center;width:100%;background:transparent;border:none;color:#7a6a5c;padding:10px 16px;border-radius:10px;cursor:pointer;font-size:0.82rem;font-family:'Noto Sans KR',sans-serif;transition:all 0.15s;}
  .dropdown-item:hover,.dropdown-item.active{background:rgba(200,149,106,0.12);color:#c8956a;}
  .dropdown-item .item-desc{font-size:0.73rem;opacity:0.7;}
  .dropdown-item .item-label{font-family:'Gowun Batang',serif;font-size:0.88rem;}

  /* 호흡 */
  .breath-visual{position:relative;width:220px;height:220px;display:flex;align-items:center;justify-content:center;margin-bottom:28px;}
  .ring-outer{position:absolute;inset:0;border-radius:50%;pointer-events:none;transition:box-shadow 0.1s;}
  .ring-mid{position:absolute;inset:18px;border-radius:50%;transition:border-color 0.2s;}
  .ring-edge{position:absolute;inset:0;border-radius:50%;transition:border-color 0.2s;}
  .breath-blob{width:130px;height:130px;border-radius:50%;background:radial-gradient(circle at 38% 36%,#c8956a 0%,#a06840 40%,#7a4c28 72%,#3e2010 100%);will-change:transform;}
  .phase-area{text-align:center;margin-bottom:22px;min-height:52px;}
  .phase-label{font-family:'Gowun Batang',serif;font-size:1.25rem;color:#e8ddd3;opacity:0.8;margin-bottom:6px;min-height:1.6rem;}
  .phase-count{font-family:'Gowun Batang',serif;font-size:0.95rem;color:#c8956a;opacity:0.6;min-height:1.3rem;}
</style>
</head>

    <div class="logo-text">이든이가족쉼터</div>
  </div>

  <!-- 컨텐츠 -->
  <div class="content">
    <div class="breath-page">
      <div class="dropdown-wrap" id="breath-pattern-wrap" style="margin-bottom:28px;">
        <button class="dropdown-trigger" id="patternTrigger" onclick="toggleDropdown('patternMenu','patternTrigger')">
          <span class="desc" id="patternDesc">기본 호흡</span>
          <span style="font-family:'Gowun Batang',serif;" id="patternLabel">4 · 4</span>
          <span class="arr">▼</span>
        </button>
        <div class="dropdown-menu" id="patternMenu"></div>
      </div>

      <div class="breath-visual">
        <div class="ring-outer" id="ringOuter"></div>
        <div class="ring-mid"   id="ringMid"></div>
        <div class="ring-edge"  id="ringEdge"></div>
        <div class="breath-blob" id="blob"></div>
      </div>

      <div class="phase-area">
        <div class="phase-label" id="phaseLabel">시작 버튼을 눌러요</div>
        <div class="phase-count" id="phaseCount"></div>
      </div>

      <button class="btn-main" id="breathBtn" onclick="toggleBreath()">시작하기</button>
    </div>


  </div>


</div>

<div class="hint">눈을 감고, 숨을 따라가요 🌙</div>

<script>
// ══════════════════════
// 데이터
// ══════════════════════
const PATTERNS = [
  {label:"4 · 4",     desc:"기본 호흡",   i:4,h1:0,e:4,h2:0},
  {label:"4 · 7 · 8", desc:"깊은 릴랙스", i:4,h1:7,e:8,h2:0},
  {label:"5 · 5",     desc:"균형 호흡",   i:5,h1:0,e:5,h2:0},
  {label:"6 · 6",     desc:"느린 호흡",   i:6,h1:0,e:6,h2:0},
  {label:"박스",       desc:"집중·안정",   i:4,h1:4,e:4,h2:4},
  {label:"2 · 1 · 4", desc:"빠른 진정",   i:2,h1:1,e:4,h2:0},
  {label:"삼각",       desc:"에너지 충전", i:4,h1:4,e:4,h2:0},
  {label:"8 · 8",     desc:"깊은 수면",   i:8,h1:0,e:8,h2:0},
];

const SLEEP_PRESETS = [];

// ══════════════════════
// 탭 전환
// ══════════════════════


// ══════════════════════
// 드롭다운
// ══════════════════════
function toggleDropdown(menuId, triggerId) {
  const menu = document.getElementById(menuId);
  const trigger = document.getElementById(triggerId);
  const isOpen = menu.classList.contains('open');
  // 모든 드롭다운 닫기
  document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));
  document.querySelectorAll('.dropdown-trigger').forEach(t=>t.classList.remove('open'));
  if (!isOpen) { menu.classList.add('open'); trigger.classList.add('open'); }
}
document.addEventListener('click', e => {
  if (!e.target.closest('.dropdown-wrap')) {
    document.querySelectorAll('.dropdown-menu').forEach(m=>m.classList.remove('open'));
    document.querySelectorAll('.dropdown-trigger').forEach(t=>t.classList.remove('open'));
  }
});

// ══════════════════════
// 호흡 엔진
// ══════════════════════
let breathRunning = false;
let breathCancelled = false;
let patternIdx = 0;
let blobScale = 0.72, glowOpacity = 0;
let animRaf = null, breathTimer = null;

const PHASE_LABELS = {inhale:"들이쉬어요",hold1:"참아요",exhale:"내쉬어요",hold2:"잠깐 쉬어요"};

// 패턴 드롭다운 렌더
(function buildPatternMenu(){
  const menu = document.getElementById('patternMenu');
  PATTERNS.forEach((p,i)=>{
    const btn = document.createElement('button');
    btn.className = 'dropdown-item' + (i===0?' active':'');
    btn.innerHTML = `<span class="item-desc">${p.desc}</span><span class="item-label">${p.label}</span>`;
    btn.onclick = () => selectPattern(i);
    menu.appendChild(btn);
  });
})();

function selectPattern(i) {
  patternIdx = i;
  document.getElementById('patternDesc').textContent = PATTERNS[i].desc;
  document.getElementById('patternLabel').textContent = PATTERNS[i].label;
  document.querySelectorAll('#patternMenu .dropdown-item').forEach((b,j)=>b.classList.toggle('active',j===i));
  document.getElementById('patternMenu').classList.remove('open');
  document.getElementById('patternTrigger').classList.remove('open');
  if (breathRunning) { stopBreath(); startBreath(); }
}

function updateBlob() {
  const blob = document.getElementById('blob');
  const glow = glowOpacity;
  const s = blobScale;

  // border-radius
  if (s > 1.0) {
    const d = s - 1;
    blob.style.borderRadius = `${46+d*18}% ${54-d*18}% ${52+d*8}% ${48-d*8}% / ${48+d*8}% ${52-d*8}% 50% 50%`;
  } else {
    blob.style.borderRadius = '50%';
  }
  blob.style.transform = `scale(${s})`;
  blob.style.boxShadow = `0 0 ${30+glow*50}px ${glow*18}px rgba(200,149,106,${glow*0.32}), inset 0 0 ${18+glow*18}px rgba(255,200,150,${0.04+glow*0.08})`;

  // rings
  document.getElementById('ringOuter').style.boxShadow = `0 0 ${s*60+10}px ${s*60+10}px rgba(200,149,106,${glow*0.10})`;
  document.getElementById('ringMid').style.border = `1px solid rgba(200,149,106,${glow*0.22})`;
  document.getElementById('ringEdge').style.border = `1px solid rgba(200,149,106,${glow*0.12})`;
}

function animateTo(targetS, targetG, durationMs, totalSec, onDone) {
  const startS = blobScale, startG = glowOpacity;
  const startT = performance.now();
  let lastCount = totalSec;
  document.getElementById('phaseCount').textContent = totalSec;

  function frame(now) {
    if (breathCancelled) return;
    const raw = (now - startT) / durationMs;
    const t = Math.min(raw, 1);
    const ease = t < 0.5 ? 2*t*t : -1+(4-2*t)*t;
    blobScale = startS + (targetS - startS) * ease;
    glowOpacity = startG + (targetG - startG) * ease;
    updateBlob();
    const rem = Math.ceil(totalSec * (1 - raw));
    if (rem !== lastCount) { lastCount = rem; document.getElementById('phaseCount').textContent = rem > 0 ? rem : ''; }
    if (t < 1) animRaf = requestAnimationFrame(frame);
    else { document.getElementById('phaseCount').textContent = ''; onDone(); }
  }
  animRaf = requestAnimationFrame(frame);
}

function doCountdown(secs, onDone) {
  let t = secs;
  document.getElementById('phaseCount').textContent = t;
  function tick() {
    if (breathCancelled) return;
    t--;
    if (t <= 0) { document.getElementById('phaseCount').textContent = ''; onDone(); }
    else { document.getElementById('phaseCount').textContent = t; breathTimer = setTimeout(tick, 1000); }
  }
  breathTimer = setTimeout(tick, 1000);
}

function doPhase(ph) {
  if (breathCancelled) return;
  const p = PATTERNS[patternIdx];
  document.getElementById('phaseLabel').textContent = PHASE_LABELS[ph] || '';

  if (ph === 'inhale') {
    animateTo(1.22, 0.88, p.i * 1000, p.i, () => {
      if (breathCancelled) return;
      blobScale = 1.22; glowOpacity = 0.88;
      if (p.h1 > 0) { document.getElementById('phaseLabel').textContent = PHASE_LABELS.hold1; doCountdown(p.h1, ()=>doPhase('exhale')); }
      else doPhase('exhale');
    });
  } else if (ph === 'exhale') {
    animateTo(0.72, 0, p.e * 1000, p.e, () => {
      if (breathCancelled) return;
      blobScale = 0.72; glowOpacity = 0;
      if (p.h2 > 0) { document.getElementById('phaseLabel').textContent = PHASE_LABELS.hold2; doCountdown(p.h2, ()=>doPhase('inhale')); }
      else doPhase('inhale');
    });
  }
}

function startBreath() {
  breathRunning = true; breathCancelled = false;
  blobScale = 0.72; glowOpacity = 0;
  document.getElementById('breathBtn').textContent = '멈추기';
  doPhase('inhale');
}

function stopBreath() {
  breathRunning = false; breathCancelled = true;
  clearTimeout(breathTimer); cancelAnimationFrame(animRaf);
  blobScale = 0.72; glowOpacity = 0; updateBlob();
  document.getElementById('breathBtn').textContent = '시작하기';
  document.getElementById('phaseLabel').textContent = '시작 버튼을 눌러요';
  document.getElementById('phaseCount').textContent = '';
}

function toggleBreath() {
  breathRunning ? stopBreath() : startBreath();
}

</script>
