<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이든이연구소 — AI 논문 검색기</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#0e0e12;--surface:#16161d;--card:#1c1c26;--border:#2a2a38;--accent:#3b82f6;--accent2:#60a5fa;--text:#f0ede8;--muted:#888899;--radius:14px;}
  body{background:var(--bg);color:var(--text);font-family:'Noto Sans KR',sans-serif;min-height:100vh;display:flex;flex-direction:column;align-items:center;padding:0 16px 60px;overflow-x:hidden}
  body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(59,130,246,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(59,130,246,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0}
  body::after{content:'';position:fixed;top:-200px;left:50%;transform:translateX(-50%);width:700px;height:500px;background:radial-gradient(ellipse,rgba(59,130,246,.08) 0%,transparent 70%);pointer-events:none;z-index:0}

  nav{width:100%;max-width:700px;display:flex;align-items:center;justify-content:space-between;padding:24px 0 0;position:relative;z-index:10}
  .gallery-btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1.5px solid var(--border);border-radius:100px;padding:9px 18px;font-size:13px;font-weight:700;color:var(--muted);text-decoration:none;transition:all .2s;font-family:'Inter',sans-serif;white-space:nowrap}
  .gallery-btn:hover{border-color:var(--accent);color:var(--accent2);background:rgba(59,130,246,.08);transform:translateY(-1px)}
  .logo{display:flex;align-items:center;gap:10px;text-decoration:none;color:var(--text)}
  .logo img{width:36px;height:36px;border-radius:8px;object-fit:cover;box-shadow:0 0 16px rgba(59,130,246,.4);flex-shrink:0}
  .logo-text-wrap{display:flex;flex-direction:column;line-height:1}
  .logo-name{font-family:'Inter',sans-serif;font-size:17px;font-weight:800;letter-spacing:-.5px}
  .logo-name span{color:var(--accent)}
  .logo-sub{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--muted);letter-spacing:1.5px;text-transform:uppercase;margin-top:2px}

  main{width:100%;max-width:700px;flex:1;display:flex;flex-direction:column;align-items:center;padding:40px 0 0;position:relative;z-index:10}
  h1{font-family:'Inter',sans-serif;font-size:clamp(24px,5vw,40px);font-weight:800;text-align:center;line-height:1.2;margin-bottom:12px;letter-spacing:-1.5px}
  h1 .highlight{color:var(--accent)}

  /* 뱃지 */
  .badge-wrap{display:flex;justify-content:center;margin-bottom:32px}
  .badge-pill{display:inline-flex;align-items:center;gap:10px;background:var(--card);border:1.5px solid var(--border);border-radius:100px;padding:10px 20px}
  .badge-ico{font-size:18px}
  .badge-main{font-size:13px;font-weight:700;color:var(--text);font-family:'Inter',sans-serif;white-space:nowrap}

  /* 검색 섹션 */
  .search-section{width:100%;margin-bottom:28px}
  .search-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:8px;letter-spacing:.3px}
  .search-box{width:100%;background:var(--card);border:1.5px solid var(--border);border-radius:16px;overflow:hidden;transition:border-color .2s,box-shadow .2s}
  .search-box:focus-within{border-color:var(--accent);box-shadow:0 0 0 3px rgba(59,130,246,.12)}
  #searchInput{width:100%;background:transparent;border:none;font-size:15px;color:var(--text);font-family:'Noto Sans KR',sans-serif;outline:none;resize:none;line-height:1.7;height:130px;padding:16px 16px 10px;display:block}
  #searchInput::placeholder{color:var(--muted);line-height:1.7}
  .search-bar{display:flex;align-items:center;justify-content:space-between;padding:8px 14px 12px;border-top:1px solid var(--border)}
  .char-count{font-size:11px;color:var(--muted);font-family:'Inter',sans-serif}
  .search-hint{font-size:11px;color:var(--muted)}
  .search-btn{width:100%;background:var(--accent);border:none;border-radius:12px;padding:15px;font-size:15px;font-weight:700;color:#fff;cursor:pointer;transition:background .2s;font-family:'Noto Sans KR',sans-serif;margin-top:10px;display:flex;align-items:center;justify-content:center;gap:8px}
  .search-btn:hover{background:var(--accent2)}
  .search-btn:active{transform:scale(.98)}

  /* 인기 검색어 */
  .popular-section{width:100%;margin-bottom:28px}
  .popular-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
  .popular-grid{display:flex;flex-wrap:wrap;gap:7px}
  .pop-chip{background:var(--card);border:1px solid var(--border);border-radius:100px;padding:6px 14px;font-size:12px;color:var(--muted);cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:5px}
  .pop-chip:hover{border-color:var(--accent);color:var(--accent2);background:rgba(59,130,246,.06)}

  /* 카테고리 카드 */
  .category-section{width:100%;margin-bottom:28px}
  .category-label{font-size:12px;font-weight:700;color:var(--muted);margin-bottom:10px;letter-spacing:.3px}
  .category-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
  @media(min-width:500px){.category-grid{grid-template-columns:repeat(3,1fr)}}
  .cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 14px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:10px}
  .cat-card:hover{border-color:var(--accent);background:#22222e;transform:translateY(-2px)}
  .cat-ico{font-size:20px;flex-shrink:0}
  .cat-info{display:flex;flex-direction:column;gap:2px}
  .cat-name{font-size:13px;font-weight:700;color:var(--text)}
  .cat-desc{font-size:10px;color:var(--muted)}

  /* 구글 스칼라 배너 */
  .scholar-banner{width:100%;background:linear-gradient(135deg,rgba(59,130,246,.08),rgba(99,102,241,.08));border:1.5px solid rgba(59,130,246,.2);border-radius:16px;padding:18px 20px;display:flex;align-items:center;gap:14px;cursor:pointer;transition:border-color .2s;margin-bottom:28px;text-decoration:none}
  .scholar-banner:hover{border-color:var(--accent)}
  .scholar-ico{font-size:28px;flex-shrink:0}
  .scholar-info{flex:1}
  .scholar-title{font-size:13px;font-weight:700;color:var(--text);margin-bottom:3px}
  .scholar-desc{font-size:11px;color:var(--muted)}
  .scholar-arr{font-size:18px;color:var(--accent2)}

  .contact-section{width:100%;max-width:700px;text-align:center;padding:8px 0 0;position:relative;z-index:10}
  .contact-text{font-size:13px;color:var(--muted);margin-bottom:10px}
  .contact-btn{display:inline-flex;align-items:center;gap:7px;background:var(--card);border:1px solid var(--border);border-radius:100px;padding:10px 20px;font-size:13px;color:var(--muted);text-decoration:none;transition:all .2s;font-family:'Noto Sans KR',sans-serif}
  .contact-btn:hover{border-color:var(--accent);color:var(--accent2)}

  footer{position:relative;z-index:10;width:100%;max-width:700px;padding:24px 0;display:flex;flex-direction:column;align-items:center;gap:8px;border-top:1px solid var(--border);margin-top:8px}
  .footer-logo{display:flex;align-items:center;gap:8px;text-decoration:none}
  .footer-logo img{width:26px;height:26px;border-radius:6px;object-fit:cover}
  .footer-name{font-family:'Inter',sans-serif;font-size:13px;font-weight:800;color:var(--text)}
  .footer-name span{color:var(--accent)}
  .footer-copy{font-size:11px;color:#3a3a52}
</style>
</head>
