
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>이든이연구소</title>
<style>
body { font-family: sans-serif; margin:0; }
#chat { height: 80vh; overflow-y:auto; padding:10px; background:#f5f5f5;}
.msg { margin:5px 0; padding:8px 12px; border-radius:10px; max-width:70%;}
.user { background:#4f6ef7; color:white; margin-left:auto;}
.ai { background:#ddd;}
#inputArea { display:flex; padding:10px; border-top:1px solid #ccc;}
#input { flex:1; padding:10px; border-radius:10px; border:1px solid #ccc;}
button { margin-left:10px; padding:10px 15px; border:none; border-radius:10px; background:#4f6ef7; color:white;}
</style>
</head>
<body>

<div id="chat"></div>

<div id="inputArea">
  <input id="input" placeholder="메시지 입력">
  <button onclick="send()">전송</button>
</div>

<script>
const apiKey = "AIzaSyDEkzGD2Bq_q_0lB8VLlMxwfM2hPphM3y4";

function addMsg(role, text) {
  const div = document.createElement('div');
  div.className = 'msg ' + role;
  div.innerText = text;
  document.getElementById('chat').appendChild(div);
  document.getElementById('chat').scrollTop = 999999;
}

async function send() {
  const input = document.getElementById('input');
  const text = input.value.trim();
  if (!text) return;

  addMsg('user', text);
  input.value = '';

  try {
    const res = await fetch(
      "https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-lite:generateContent?key=" + apiKey,
      {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          contents: [
            {
              parts: [{ text: text }]
            }
          ]
        })
      }
    );

    const data = await res.json();

    if (!res.ok) {
      throw new Error(JSON.stringify(data));
    }

    let aiText = "응답 없음";

    if (data.candidates && data.candidates.length > 0) {
      aiText = data.candidates[0].content.parts
        .map(p => p.text)
        .join('');
    }

    addMsg('ai', aiText);

  } catch (e) {
    addMsg('ai', "오류 발생: " + e.message);
    console.error(e);
  }
}
</script>

</body>
</html>
